name: China Domain Rules

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignore DNS cache and re-query all domains"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - "data/sources/ChinaDomain.txt"
      - "scripts/china_domain_rules.py"
      - ".github/workflows/china_domain_rules.yml"
  schedule:
    - cron: "27 19 * * 6"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: china-domain-rules
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 330

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx[http2] dnspython

      - name: Build China rules
        env:
          FORCE_DNS_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh && '1' || '0' }}
          CHINA_DOMAIN_MAX_CONCURRENCY: "96"
          CHINA_DOMAIN_REQUEST_TIMEOUT: "4.5"
          CHINA_DOMAIN_SUCCESS_CACHE_HOURS: "720"
          CHINA_DOMAIN_FAILURE_CACHE_HOURS: "72"
        run: |
          python scripts/china_domain_rules.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/temporary/ChinaDomainCollection.txt \
            data/temporary/ChinaDomainDNSresults.txt \
            data/temporary/ChinaDomainDNSTidy.txt \
            data/temporary/ChinaDomainTidy.txt \
            Surge/Rules/China.list

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: rebuild China rules"
          git push
