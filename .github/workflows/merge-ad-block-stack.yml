name: Update Ad Block Stack

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"
  push:
    paths:
      - "data/sources/ad_allowlist_seed_urls.txt"
      - "data/sources/ad_module_seed_urls.txt"
      - "data/sources/repo_seed_urls.txt"
      - "data/allowlists/**"
      - "scripts/run_ad_block_pipeline.py"
      - "scripts/discover_module_candidates.py"
      - "scripts/discover_allowlist_candidates.py"
      - "scripts/fetch_and_normalize_modules.py"
      - "scripts/scan_js_security.py"
      - "scripts/build_ad_block_outputs.py"
      - "scripts/validate_ad_block_outputs.py"
      - "scripts/build_ad_block.py"
      - "scripts/lib_rules.py"
      - ".github/workflows/merge-ad-block-stack.yml"

permissions:
  contents: write

concurrency:
  group: merge-ad-block-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      SOCKET_TOKEN: ${{ secrets.SOCKET_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml semgrep

      - name: Install JS-X-Ray
        run: |
          npm install -g @nodesecure/js-x-ray || true

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-freshclam || true

      - name: Update ClamAV database
        shell: bash
        run: |
          sudo systemctl stop clamav-freshclam.service || true
          sudo pkill -x freshclam || true

          if ! command -v freshclam >/dev/null 2>&1; then
            echo "freshclam not found, skip database update"
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/clamav-db"

          cat > "$RUNNER_TEMP/freshclam.conf" <<EOF
          DatabaseDirectory $RUNNER_TEMP/clamav-db
          DatabaseMirror database.clamav.net
          EOF

          echo "===== freshclam.conf ====="
          cat "$RUNNER_TEMP/freshclam.conf"
          echo "=========================="

          sudo freshclam \
            --stdout \
            --config-file="$RUNNER_TEMP/freshclam.conf" \
            --datadir="$RUNNER_TEMP/clamav-db" \
            --checks=1 \
            -u root \
          || {
            echo "freshclam update skipped, but workflow will continue"
            exit 0
          }

          echo "CLAMAV_DB_DIR=$RUNNER_TEMP/clamav-db" >> "$GITHUB_ENV"

      - name: Validate required ad-block inputs
        run: |
          test -f data/sources/ad_allowlist_seed_urls.txt
          test -f data/sources/ad_module_seed_urls.txt
          test -f data/sources/repo_seed_urls.txt
          test -f scripts/discover_module_candidates.py
          test -f scripts/discover_allowlist_candidates.py
          test -f scripts/fetch_and_normalize_modules.py
          test -f scripts/scan_js_security.py
          test -f scripts/build_ad_block_outputs.py
          test -f scripts/validate_ad_block_outputs.py
          test -f scripts/run_ad_block_pipeline.py
          test -f scripts/build_ad_block.py
          test -f scripts/lib_rules.py

      - name: Run Ad Block pipeline
        run: python -u scripts/run_ad_block_pipeline.py

      - name: Upload ad-block diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ad-block-diagnostics
          if-no-files-found: ignore
          path: |
            build/discovered_module_urls.txt
            build/discovered_allowlist_urls.txt
            build/normalized_modules.json
            build/whitelist_hosts.txt
            build/rejected_rules.txt
            build/scan_reports/**

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          stage_path() {
            path="$1"
            if [ -e "$path" ] || git ls-files --error-unmatch -- "$path" >/dev/null 2>&1; then
              git add -A -- "$path"
            fi
          }

          for path in \
            Surge/Rules/Ad_Block.list \
            Surge/Module/Ad_Block.sgmodule \
            Surge/Scripts/Converted
          do
            stage_path "$path"
          done

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update ad block stack" || echo "nothing to commit"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/$GITHUB_REPOSITORY"

          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            git fetch origin main || true
            git rebase origin/main || (git rebase --abort || true)

            if git push origin main; then
              echo "push succeeded"
              break
            fi

            echo "push failed, attempt $attempt/$max_attempts, retrying after brief sleep..."
            sleep $((RANDOM % 5 + 1))
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "push failed after $max_attempts attempts"
            exit 1
          fi
