name: Update China Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "40 2 * * *"

permissions:
  contents: write

concurrency:
  group: merge-china-list-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build china rules
        run: python scripts/build_china.py

      - name: Upload china diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: china-diagnostics
          if-no-files-found: ignore
          path: build/china_validation.json

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          stage_path() {
            path="$1"
            if [ -e "$path" ] || git ls-files --error-unmatch -- "$path" >/dev/null 2>&1; then
              git add -A -- "$path"
            fi
          }

          for path in \
            Surge/Rules/China.list \
            build/china_validation.json \
            build/china_review.json \
            build/china_rejected.json \
            build/china_unresolved.json
          do
            stage_path "$path"
          done

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update china rules" || {
            echo "Nothing to commit."
            exit 0
          }

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}"

          max_attempts=5
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "Push attempt $attempt/$max_attempts"

            git fetch origin main

            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Rebase failed. Re-applying commit on top of latest origin/main..."
              git reset --soft HEAD~1
              git reset
              for path in \
                Surge/Rules/China.list \
                build/china_validation.json \
                build/china_review.json \
                build/china_rejected.json \
                build/china_unresolved.json
              do
                stage_path "$path"
              done
              if git diff --cached --quiet; then
                echo "No changes after syncing with origin/main."
                exit 0
              fi
              git commit -m "chore: update china rules"
              git fetch origin main
              git rebase origin/main
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep $((RANDOM % 5 + 2))
            attempt=$((attempt + 1))
          done

          echo "Push failed after $max_attempts attempts."
          exit 1
