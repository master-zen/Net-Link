name: Update China Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "40 2 * * *"

permissions:
  contents: write

concurrency:
  group: merge-china-list-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build china rules
        run: python scripts/build_china.py

      - name: Upload china diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: china-diagnostics
          if-no-files-found: ignore
          path: build/china_validation.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Surge/Rules/China.list

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update china rules"
          git push
