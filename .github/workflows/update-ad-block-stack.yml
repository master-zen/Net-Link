name: Update Ad Block Stack

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"
  push:
    paths:
      - "data/sources/**"
      - "data/allowlists/**"
      - "scripts/**"
      - ".github/workflows/update-ad-block-stack.yml"

permissions:
  contents: write

concurrency:
  group: update-ad-block-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      SOCKET_TOKEN: ${{ secrets.SOCKET_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml semgrep

      - name: Install JS-X-Ray
        run: |
          npm install -g @nodesecure/js-x-ray || true

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-freshclam || true

      - name: Update ClamAV database
        run: |
          sudo freshclam || true

      - name: Discover module candidates
        run: python scripts/discover_module_candidates.py

      - name: Discover allowlist candidates
        run: python scripts/discover_allowlist_candidates.py

      - name: Fetch and normalize modules
        run: python scripts/fetch_and_normalize_modules.py

      - name: Scan JS security
        run: python scripts/scan_js_security.py

      - name: Build final Ad_Block outputs
        run: python scripts/build_ad_block_outputs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            Surge/Rules/Ad_Block.list \
            Surge/Module/Ad_Block.sgmodule \
            build/discovered_module_urls.txt \
            build/discovered_allowlist_urls.txt \
            build/normalized_modules.json \
            build/whitelist_hosts.txt \
            build/rejected_rules.txt \
            build/scan_reports || true

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update ad block stack"

          git fetch origin main
          git pull --rebase origin main

          git push origin HEAD:main
