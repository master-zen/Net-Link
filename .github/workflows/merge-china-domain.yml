name: Merge China Domain Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: merge-china-domain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build ChinaDomain list
        run: python scripts/build_china_domain.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            Surge/Rules/ChinaDomain.list \
            Clash/Rules/ChinaDomain.yaml

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update china domain rules"
          git push
