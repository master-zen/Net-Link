name: Update HTTPDNS Block Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: merge-httpdns-block-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build HTTPDNS block rules
        run: python scripts/build_httpdns_block.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Surge/Rules/httpDNS_Block.list

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update httpdns block rules"
          git push
