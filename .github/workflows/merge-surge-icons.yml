name: Build Surge Icon JSON

on:
  workflow_dispatch:
  schedule:
    # 05:10 Asia/Shanghai (UTC+8), every 2 days
    - cron: "10 21 */2 * *"

permissions:
  contents: write

concurrency:
  group: net-link-rules-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build Surge Icon.json
        run: python scripts/build_icon_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Surge/Icon.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update surge icon index"
          git push
